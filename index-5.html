<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TeamDream - Minimal Circle floating card layout built with Bootstrap 5.3">
  <title>TeamDream — Minimal Circle | Team Card Bootstrap Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="src/assets/css/materialdesignicons.css">
  <link rel="stylesheet" href="src/assets/css/style.css">
  <style>
    body { background-color: #ffffff; }
  </style>
</head>
<body>

  <a href="landing.html" class="td-all-layouts-btn">
    <i class="mdi mdi-grid-large"></i> All Layouts
  </a>

  <section class="td-section">
    <div class="container">

      <div class="td-section-heading">
        <p class="td-eyebrow">Our People</p>
        <h2>Faces Behind the Work</h2>
        <p>Simple. Clean. Personal. Hover to reveal each card.</p>
      </div>

      <div class="row gy-3 justify-content-center">

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team1.jpg" alt="Jackson Redfern">
            <h3 class="td-minimal-name">Jackson Redfern</h3>
            <p class="td-minimal-role">Founder &amp; CEO</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="X"><img class="td-soc-ic" src="src/assets/img/icons/sw-x.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="GitHub"><img class="td-soc-ic" src="src/assets/img/icons/sw-git.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team2.jpg" alt="Amy Gatzert">
            <h3 class="td-minimal-name">Amy Gatzert</h3>
            <p class="td-minimal-role">Production Lead</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="GitHub"><img class="td-soc-ic" src="src/assets/img/icons/sw-git.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="X"><img class="td-soc-ic" src="src/assets/img/icons/sw-x.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team3.jpg" alt="Elizabeth Guerrero">
            <h3 class="td-minimal-name">Elizabeth Guerrero</h3>
            <p class="td-minimal-role">Project Manager</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="Facebook"><img class="td-soc-ic" src="src/assets/img/icons/sw-fb.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="Dribbble"><img class="td-soc-ic" src="src/assets/img/icons/sw-db.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team4.jpg" alt="Kate Jeffers">
            <h3 class="td-minimal-name">Kate Jeffers</h3>
            <p class="td-minimal-role">Head of Talent</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="Facebook"><img class="td-soc-ic" src="src/assets/img/icons/sw-fb.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="X"><img class="td-soc-ic" src="src/assets/img/icons/sw-x.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team5.jpg" alt="Marcus Chen">
            <h3 class="td-minimal-name">Marcus Chen</h3>
            <p class="td-minimal-role">Senior Developer</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="GitHub"><img class="td-soc-ic" src="src/assets/img/icons/sw-git.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="X"><img class="td-soc-ic" src="src/assets/img/icons/sw-x.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-6">
          <div class="td-minimal-wrap td-card">
            <img class="td-min-img" src="src/assets/img/team/team6.jpg" alt="Sofia Ricci">
            <h3 class="td-minimal-name">Sofia Ricci</h3>
            <p class="td-minimal-role">UI/UX Designer</p>
            <div class="td-minimal-social">
              <a href="#" aria-label="Dribbble"><img class="td-soc-ic" src="src/assets/img/icons/sw-db.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="Behance"><img class="td-soc-ic" src="src/assets/img/icons/sw-fig.svg" alt="" width="16" height="16"></a>
              <a href="#" aria-label="LinkedIn"><img class="td-soc-ic" src="src/assets/img/icons/sw-in.svg" alt="" width="16" height="16"></a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="src/assets/js/main.js"></script>
</body>
</html>
